<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-label="AIRDOX lettering study Berlin Stencil Break">
  
  <defs>
    <filter id="paperNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12"/>
    </filter>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="13" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="chrome" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.22" stop-color="#00f0ff"/>
      <stop offset="0.48" stop-color="#10131b"/>
      <stop offset="0.68" stop-color="#ff00aa"/>
      <stop offset="1" stop-color="#f5f8ff"/>
    </linearGradient>
    <pattern id="dotgrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#00f0ff" opacity="0.23"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#050608"/>
  <rect width="100%" height="100%" fill="url(#dotgrid)" opacity="0.25"/>
  <g font-family="Inter, Arial, sans-serif" letter-spacing="0">
    <text x="52" y="54" fill="#9aa6b2" font-size="21" font-weight="800">01 / Berlin Stencil Break</text>
    <text x="52" y="526" fill="#9aa6b2" font-size="20" font-weight="700">Sharp stencil skeleton, hard cuts, useful for industrial poster motion.</text>
  </g>
  
        <g transform="translate(10 0)">
          
  <g transform="translate(82 92) " >
    
