name: Agent Job Dispatch

on:
  workflow_dispatch:
    inputs:
      event:
        description: "Job trigger event"
        required: true
        default: "manual_background"
      status:
        description: "Job trigger status"
        required: true
        default: "standard"
      approved:
        description: "Comma-separated Master Controller approvals for gravierend jobs"
        required: false
        default: ""
      user_approved:
        description: "Comma-separated personal user approvals for external_live jobs"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate catalog
        run: npm run agent:jobs:validate -- --strict-warnings

      - name: Run selected jobs
        run: npm run agent:jobs:run -- --event="${{ inputs.event }}" --status="${{ inputs.status }}" --approved="${{ inputs.approved }}" --user-approved="${{ inputs.user_approved }}"

      - name: Generate system health
        if: always()
        run: npm run agent:system:health

      - name: Upload dispatch reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-dispatch-reports
          path: |
            docs/agent-system/latest-job-run.json
            docs/agent-system/latest-job-run.md
            docs/agent-system/latest-agent-system-health.json
            docs/agent-system/latest-agent-system-health.md
            docs/agent-system/AGENT_SYSTEM_ARCHITECTURE.md
          if-no-files-found: warn
