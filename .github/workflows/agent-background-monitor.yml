name: Agent Background Monitor

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run depth"
        required: true
        default: "deep"
        type: choice
        options:
          - standard
          - deep

permissions:
  contents: read

jobs:
  background:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run background cycle
        run: |
          if [ "${{ inputs.mode || 'deep' }}" = "standard" ]; then
            npm run agents:background
          else
            npm run agents:background:deep
          fi

      - name: Upload agent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-background-reports
          path: |
            docs/agent-system/latest-*.json
            docs/agent-system/latest-*.md
            docs/agent-system/AGENT_SYSTEM_ARCHITECTURE.md
          if-no-files-found: warn
